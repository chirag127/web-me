name: Process Google Takeout

on:
  schedule:
    - cron: '0 3 1 * *'   # 03:00 UTC on 1st of every month
  workflow_dispatch:        # manual trigger anytime

jobs:
  process-takeout:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download latest Takeout from Google Drive
        id: download
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const { execSync } = require('child_process');
          const { createWriteStream } = require('fs');
          const { pipeline } = require('stream/promises');

          async function main() {
            // Exchange refresh token for access token
            const tokenRes = await fetch('https://oauth2.googleapis.com/token', {
              method: 'POST',
              headers: {'Content-Type':'application/x-www-form-urlencoded'},
              body: new URLSearchParams({
                client_id: process.env.GOOGLE_CLIENT_ID,
                client_secret: process.env.GOOGLE_CLIENT_SECRET,
                refresh_token: process.env.GOOGLE_REFRESH_TOKEN,
                grant_type: 'refresh_token',
              })
            });
            const { access_token } = await tokenRes.json();
            console.log('Access token obtained:', access_token ? 'yes' : 'NO');

            // List Drive files
            const listRes = await fetch('https://www.googleapis.com/drive/v3/files?q=' + encodeURIComponent("name contains 'takeout' and mimeType = 'application/zip' and trashed = false") + '&orderBy=createdTime desc&pageSize=10&fields=files(id,name,size,createdTime)', {
              headers: {'Authorization': 'Bearer ' + access_token}
            });
            const { files } = await listRes.json();
            console.log('Found', files?.length, 'takeout files');
            if (!files?.length) { console.log('No files found'); process.exit(0); }
            files.forEach(f => console.log(' -', f.name, Math.round(f.size/1024/1024)+'MB'));

            // Pick largest
            const file = files.sort((a,b) => parseInt(b.size||0)-parseInt(a.size||0))[0];
            const fileSizeMB = file.size ? Math.round(parseInt(file.size) / 1024 / 1024) : 0;
            console.log('Downloading:', file.name, fileSizeMB+'MB');

            // Verify file has content before downloading
            if (!file.size || parseInt(file.size) === 0) {
              console.log('WARNING: Selected file has 0 size, skipping download');
              process.exit(0);
            }

            // Stream download
            const dest = '/tmp/takeout.zip';
            const dlRes = await fetch('https://www.googleapis.com/drive/v3/files/' + file.id + '?alt=media', {
              headers: {'Authorization': 'Bearer ' + access_token}
            });
            await pipeline(dlRes.body, createWriteStream(dest));
            const downloadedBytes = fs.statSync(dest).size;
            console.log(`Downloaded to ${dest} (${Math.round(downloadedBytes/1024/1024)}MB)`);
            if (downloadedBytes === 0) {
              console.log('ERROR: Downloaded file is empty');
              process.exit(1);
            }

            // Extract relevant files
            execSync(`unzip -o ${dest} "*/YouTube*" "*/watch-history.json" "*/Takeout/Fit/**" "*/Location History/**" -d /tmp/takeout-extracted/ 2>/dev/null || true`);

            // Log what was extracted
            try {
              const extracted = execSync('find /tmp/takeout-extracted -type f 2>/dev/null').toString().trim();
              const extractedFiles = extracted.split('\n').filter(Boolean);
              console.log(`Extracted ${extractedFiles.length} file(s) from archive:`);
              extractedFiles.slice(0, 30).forEach(f => console.log('  ' + f));
              if (extractedFiles.length > 30) console.log(`  ... and ${extractedFiles.length - 30} more`);
            } catch(e) { console.log('Could not list extracted files:', e.message); }

            // Parse YouTube watch history
            const ytHistoryFiles = execSync('find /tmp/takeout-extracted -name "watch-history.json" 2>/dev/null').toString().trim().split('\n').filter(Boolean);
            if (ytHistoryFiles.length) {
              const history = JSON.parse(fs.readFileSync(ytHistoryFiles[0], 'utf-8'));
              const recent = history.slice(0, 200).map(item => ({
                title: item.title?.replace('Watched ', '') ?? '',
                url: item.titleUrl ?? '',
                channel: item.subtitles?.[0]?.name ?? '',
                time: item.time ?? '',
              }));
              fs.writeFileSync('public/data/youtube-recent.json', JSON.stringify(recent, null, 2));

              // Stats
              const channels = {};
              history.forEach(item => {
                const ch = item.subtitles?.[0]?.name;
                if (ch) channels[ch] = (channels[ch] || 0) + 1;
              });
              const topChannels = Object.entries(channels).sort((a,b) => b[1]-a[1]).slice(0, 20).map(([name, count]) => ({ name, count }));
              fs.writeFileSync('public/data/youtube-stats.json', JSON.stringify({
                total: history.length,
                top_channels: topChannels,
                last_updated: new Date().toISOString(),
              }, null, 2));

              console.log(`YouTube: ${history.length} watch history entries, ${topChannels.length} top channels`);
            }

            // Parse Google Fit sleep data
            const fitSleepFiles = execSync('find /tmp/takeout-extracted -name "*.json" -path "*/Fit/*" 2>/dev/null').toString().trim().split('\n').filter(Boolean);
            if (fitSleepFiles.length) {
              const sleepSessions = [];
              for (const f of fitSleepFiles.slice(0, 50)) {
                try {
                  const data = JSON.parse(fs.readFileSync(f, 'utf-8'));
                  if (data.session && data.session.activityType === 72) { // 72 = sleep
                    sleepSessions.push({
                      start: data.session.startTimeMillis,
                      end: data.session.endTimeMillis,
                      duration_min: Math.round((data.session.endTimeMillis - data.session.startTimeMillis) / 60000),
                    });
                  }
                } catch {}
              }
              if (sleepSessions.length) {
                fs.writeFileSync('public/data/fit-sleep.json', JSON.stringify(sleepSessions.slice(-90), null, 2));
                console.log(`Fit: ${sleepSessions.length} sleep sessions`);
              }
            }

            // Parse Google Fit daily activity CSV
            const fitCsvFiles = execSync('find /tmp/takeout-extracted -name "Daily activity metrics.csv" 2>/dev/null').toString().trim().split('\n').filter(Boolean);
            if (fitCsvFiles.length) {
              const lines = fs.readFileSync(fitCsvFiles[0], 'utf-8').split('\n');
              const headers = lines[0].split(',');
              const stepIdx = headers.indexOf('Step count');
              const calIdx = headers.indexOf('Calories (kcal)');
              const distIdx = headers.indexOf('Distance (m)');
              const hrIdx = headers.indexOf('Average heart rate (bpm)');
              const dateIdx = headers.indexOf('Date');
              const rows = lines.slice(1).filter(l => l.trim()).map(l => {
                const cols = l.split(',');
                return {
                  date: cols[dateIdx] || '',
                  steps: Math.round(parseFloat(cols[stepIdx] || '0') || 0),
                  calories: Math.round((parseFloat(cols[calIdx] || '0') || 0) * 10) / 10,
                  distance_m: Math.round((parseFloat(cols[distIdx] || '0') || 0) * 10) / 10,
                  heart_rate_avg: cols[hrIdx] || '',
                };
              }).filter(r => r.date);

              if (rows.length) {
                const steps = rows.map(r => r.steps);
                const avgAll = Math.round(steps.reduce((a,b)=>a+b,0)/steps.length);
                const last30 = rows.slice(-30);
                const avg30 = Math.round(last30.reduce((a,b)=>a+b.steps,0)/last30.length);
                const totalKm = Math.round(rows.reduce((a,r)=>a+r.distance_m,0)/100)/10;

                fs.writeFileSync('public/data/fit-daily.json', JSON.stringify({
                  total_days: rows.length,
                  date_range: { start: rows[0].date, end: rows[rows.length-1].date },
                  avg_steps_all_time: avgAll,
                  avg_steps_last_30d: avg30,
                  total_distance_km: totalKm,
                  last_30_days: rows.slice(-30),
                  last_7_days: rows.slice(-7),
                }, null, 2));
                console.log(`Fit: ${rows.length} days, avg ${avgAll} steps/day, ${totalKm} km total`);
              }
            }

            // Parse Maps location history
            const mapsFiles = execSync('find /tmp/takeout-extracted -name "Records.json" -path "*/Location History/*" 2>/dev/null').toString().trim().split('\n').filter(Boolean);
            if (mapsFiles.length) {
              try {
                const mapsData = JSON.parse(fs.readFileSync(mapsFiles[0], 'utf-8'));
                const locations = mapsData.locations || [];
                // Get unique countries/places from last 1000 locations
                const recent = locations.slice(-1000);
                fs.writeFileSync('public/data/maps-locations.json', JSON.stringify({
                  total_points: locations.length,
                  last_1000: recent.map(l => ({ lat: l.latitudeE7/1e7, lng: l.longitudeE7/1e7, time: l.timestamp })),
                }, null, 2));
                console.log('Maps: ' + locations.length + ' location points');
              } catch(e) { console.log('Maps parse error:', e.message); }
            }

            console.log('Done processing Takeout');
          }

          main().catch(e => { console.error(e.message); process.exit(0); }); // exit 0 — don't fail the workflow
          EOF

      - name: Commit Takeout data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/youtube-recent.json public/data/youtube-stats.json public/data/fit-sleep.json public/data/fit-daily.json public/data/maps-locations.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore(data): process monthly Google Takeout $(date -u +%Y-%m)"
          git push
