name: Prerelease

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: prerelease-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prerelease:
    # Guard against tag-push recursion (this job creates tags).
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # astro build ONLY — never `pnpm build` (prebuild wipes committed data).
      - run: pnpm exec astro build

      - name: Compute deterministic tag
        id: tag
        run: echo "tag=prerelease-$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Package dist tarball
        run: tar -czf me-${{ steps.tag.outputs.tag }}.tar.gz -C dist .

      - name: Publish prerelease
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          prerelease: true
          files: me-${{ steps.tag.outputs.tag }}.tar.gz
